name: Linting CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Run HTML Hint
      run: npx htmlhint "**/*.html"

    - name: Run Stylelint
      run: npx stylelint "**/*.css"

    - name: Run ESLint
      run: npx eslint .